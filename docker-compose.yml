services:
  scan-and-identify:
    # Production: `docker compose pull` grabs the latest image built by the
    # GitHub Actions "Build image" workflow (manual trigger only).
    # Local dev: `docker compose up --build` builds from local source instead.
    image: ghcr.io/ipkstef/scan-and-identify:latest
    build: .
    container_name: scan-and-identify
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
